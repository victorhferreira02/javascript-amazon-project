<!doctype html>
<html>
  <head>
    <title>Checkout</title>

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="styles/shared/general.css" />
    <link rel="stylesheet" href="styles/pages/checkout/checkout-header.css" />
    <link rel="stylesheet" href="styles/pages/checkout/checkout.css" />
  </head>
  <body>
    <script type="module">
      import dayjs from "https://unpkg.com/supersimpledev@8.5.0/dayjs/esm/index.js";

      import isWeekend from "/scripts/utils/isweekend.js";

      let date = dayjs();
      console.log(date.format("dddd, MMMM D"));
      console.log(isWeekend(date));

      date = dayjs().add(2, "day");
      console.log(date.format("dddd, MMMM D"));
      console.log(isWeekend(date));

      date = dayjs().add(4, "day");
      console.log(date.format("dddd, MMMM D"));
      console.log(isWeekend(date));

      date = dayjs().add(6, "day");
      console.log(date.format("dddd, MMMM D"));
      console.log(isWeekend(date));
    </script>

    <div class="checkout-header js-checkout-header"></div>

    <div class="main">
      <div class="page-title">Review your order</div>

      <div class="checkout-grid">
        <div class="order-summary js-order-summary"></div>

        <div class="payment-summary js-payment-summary"></div>
      </div>
    </div>

    <script type="module" src="/scripts/checkout.js"></script>
  </body>
</html>
